# Workflow name displayed in GitHub Actions
name: Backend CI

# Workflow triggers
on:
  push:
    paths:
      # Run when backend files change
      - "apps/backend/**"

      # Run when this workflow changes
      - ".github/workflows/backend-ci.yml"

  pull_request:
    paths:
      - "apps/backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  backend-build:
    # Use GitHub hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python for Django checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install backend dependencies
      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          # Upgrade pip
          python -m pip install --upgrade pip

          # Install backend dependencies
          pip install -r requirements.txt

      # Step 4: Validate Django configuration
      - name: Run Django check
        working-directory: apps/backend
        env:
          # Temporary CI secret only
          DJANGO_SECRET_KEY: ci-test-secret

          # CI validation mode
          DJANGO_DEBUG: "True"

          # Database environment variables
          POSTGRES_DB: digi2
          POSTGRES_USER: digi2_user
          POSTGRES_PASSWORD: digi2_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

          # Allowed hosts for CI
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          # Check Django project setup
          python manage.py check

      # Step 5: Configure AWS credentials for image publishing
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::385018113052:role/Digi2GitHubActionsECRPushRole
          aws-region: ca-central-1

      # Step 6: Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

       # Step 7: Build and push backend image
      - name: Build and push backend image
        env:
          ECR_REGISTRY: 385018113052.dkr.ecr.ca-central-1.amazonaws.com
          ECR_REPOSITORY: digi2-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG apps/backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG