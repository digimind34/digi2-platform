# Workflow name displayed in GitHub Actions
name: Backend CI

# Workflow triggers
on:
  push:
    paths:
      # Run when backend files change
      - "apps/backend/**"

      # Run when this workflow changes
      - ".github/workflows/backend-ci.yml"

  pull_request:
    paths:
      - "apps/backend/**"

jobs:
  backend-build:
    # Use GitHub hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python for Django checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install backend dependencies
      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          # Upgrade pip
          python -m pip install --upgrade pip

          # Install backend dependencies
          pip install -r requirements.txt

      # Step 4: Validate Django configuration
      - name: Run Django check
        working-directory: apps/backend
        env:
          # Temporary CI secret only
          DJANGO_SECRET_KEY: ci-test-secret

          # CI validation mode
          DJANGO_DEBUG: "True"

          # Database environment variables
          POSTGRES_DB: digi2
          POSTGRES_USER: digi2_user
          POSTGRES_PASSWORD: digi2_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

          # Allowed hosts for CI
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          # Check Django project setup
          python manage.py check

      # Step 5: Build backend Docker image
      - name: Build backend Docker image
        run: |
          docker build -t digi2-backend:test apps/backend# trigger ECR